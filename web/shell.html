<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LiteGDK Web Example</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #09111d;
      --panel: rgba(9, 17, 29, 0.88);
      --panel-border: rgba(155, 231, 255, 0.18);
      --accent: #9be7ff;
      --accent-strong: #f4e7a1;
      --text: #f6f9ff;
      --muted: #9fb4cc;
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(155, 231, 255, 0.12), transparent 36%),
        linear-gradient(180deg, #0d1726 0%, var(--bg) 58%, #05080f 100%);
    }

    .page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .shell {
      width: min(1080px, 100%);
      display: grid;
      gap: 20px;
    }

    .header {
      text-align: center;
    }

    .header p {
      margin: 0 0 8px;
      color: var(--accent-strong);
      font-size: 0.9rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .header h1 {
      margin: 0 0 10px;
      font-size: clamp(2rem, 4vw, 3.2rem);
      line-height: 1.05;
    }

    .header span {
      color: var(--muted);
      font-size: 1rem;
    }

    .stage {
      position: relative;
      padding: 20px;
      border: 1px solid var(--panel-border);
      border-radius: 24px;
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(20px);
    }

    .status-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
      font-size: 0.95rem;
      color: var(--muted);
    }

    .progress {
      width: 100%;
      height: 10px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      margin-bottom: 18px;
    }

    .progress-bar {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent), var(--accent-strong));
      transition: width 160ms ease;
    }

    .canvas-wrap {
      position: relative;
      overflow: hidden;
      border-radius: 18px;
      background: #03070d;
      border: 1px solid rgba(255, 255, 255, 0.08);
      min-height: 320px;
      display: grid;
      place-items: center;
    }

    canvas {
      display: block;
      max-width: 100%;
      outline: none;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      gap: 12px;
      padding: 24px;
      text-align: center;
      background: rgba(3, 7, 13, 0.82);
    }

    .overlay.hidden {
      display: none;
    }

    .overlay button {
      border: 0;
      border-radius: 999px;
      padding: 14px 24px;
      font: inherit;
      font-weight: 600;
      color: #03121e;
      background: linear-gradient(135deg, var(--accent-strong), var(--accent));
      cursor: pointer;
    }

    .overlay p {
      margin: 0;
      max-width: 34rem;
      color: var(--muted);
    }

    @media (max-width: 720px) {
      .page {
        padding: 14px;
      }

      .stage {
        padding: 14px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="shell">
      <header class="header">
        <p>LiteGDK</p>
        <h1>Textbook example in the browser</h1>
        <span>DarkGDK-style C++ game loops, compiled to WebAssembly.</span>
      </header>

      <section class="stage">
        <div class="status-row">
          <div id="status">Preparing runtime...</div>
          <div id="status-detail">Waiting on assets...</div>
        </div>
        <div class="progress">
          <div id="progress-bar" class="progress-bar"></div>
        </div>
        <div class="canvas-wrap">
          <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
          <div id="start-overlay" class="overlay">
            <button id="start-button" type="button">Click to start</button>
            <p>Browsers require a user gesture before LiteGDK can unlock audio and enter the main loop.</p>
          </div>
        </div>
      </section>
    </section>
  </main>

  <script>
    const statusElement = document.getElementById("status");
    const detailElement = document.getElementById("status-detail");
    const progressBar = document.getElementById("progress-bar");
    const overlay = document.getElementById("start-overlay");
    const startButton = document.getElementById("start-button");
    let totalDependencies = 0;

    window.__litegdkAudioReady = false;

    function setStatus(text, detail) {
      if (text) {
        statusElement.textContent = text;
      }
      if (detail) {
        detailElement.textContent = detail;
      }
    }

    var Module = {
      canvas: (() => document.getElementById("canvas"))(),
      preRun: [function() {
        const gate = "litegdk-user-gesture";
        addRunDependency(gate);
        Module.litegdkStart = function() {
          if (Module.__litegdkStarted) {
            return;
          }

          Module.__litegdkStarted = true;
          window.__litegdkAudioReady = true;
          overlay.classList.add("hidden");
          setStatus("Starting example...", "Entering the LiteGDK loop.");
          removeRunDependency(gate);
          Module.canvas.focus();
        };
        setStatus("Ready to launch", "Click to start and enable audio.");
      }],
      setStatus: function(text) {
        if (!text) {
          return;
        }
        setStatus(text, "Loading WebAssembly support files.");
      },
      monitorRunDependencies: function(left) {
        totalDependencies = Math.max(totalDependencies, left);
        const completed = totalDependencies - left;
        const percent = totalDependencies === 0 ? 100 : Math.round((completed / totalDependencies) * 100);
        progressBar.style.width = percent + "%";

        if (left > 0 && !Module.__litegdkStarted) {
          setStatus("Preparing runtime...", "Downloading assets and waiting for click.");
        } else if (left === 0) {
          progressBar.style.width = "100%";
          setStatus("Running", "Example loaded successfully.");
        }
      },
      onAbort: function(reason) {
        setStatus("Startup failed", String(reason || "See browser console for details."));
      }
    };

    startButton.addEventListener("click", function() {
      if (typeof Module.litegdkStart === "function") {
        Module.litegdkStart();
      }
    });
  </script>
  {{{ SCRIPT }}}
</body>
</html>
